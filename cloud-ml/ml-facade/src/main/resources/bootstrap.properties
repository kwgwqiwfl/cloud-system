#spring config
spring.application.name=cloud-ml
spring.main.banner-mode=off
spring.main.web-application-type=servlet
spring.main.allow-circular-references=true
spring.main.allow-bean-definition-overriding=true
spring.mvc.pathmatch.matching-strategy=ant-path-matcher
spring.jackson.date-format=yyyy/MM/dd HH:mm:ss
spring.jackson.time-zone=GMT+8
##active profiles
spring.profiles.active=dev
##nacos config configs
spring.cloud.nacos.config.enabled=false
spring.cloud.nacos.config.username=nacos
spring.cloud.nacos.config.password=nacos
spring.cloud.nacos.config.namespace=welkin
spring.cloud.nacos.config.group=welkin
spring.cloud.nacos.config.server-addr=192.168.1.81:8848
spring.cloud.nacos.config.prefix=${spring.application.name}
spring.cloud.nacos.config.file-extension=properties
spring.cloud.nacos.config.extension-configs[0].group=${spring.cloud.nacos.config.group}
spring.cloud.nacos.config.extension-configs[0].data-id=common-${spring.profiles.active}.properties
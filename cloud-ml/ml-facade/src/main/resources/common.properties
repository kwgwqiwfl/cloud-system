## datasource pool config
#hikari连接池名称
spring.datasource.hikari.poolName=SpringBootJPAHikariCP
#hikari连接池最小空闲
spring.datasource.hikari.minimumIdle=5
#hikari连接池最小大小
spring.datasource.hikari.maximumPoolSize=20
#hikari连接池空闲超时（毫秒）
spring.datasource.hikari.idleTimeout=30000
#hikari连接池最大寿命（毫秒）
spring.datasource.hikari.maxLifetime=2000000
#hikari连接池连接超时（毫秒）
spring.datasource.hikari.connectionTimeout=30000


##jpa config
#是否启用JPA存储库，默认true
#spring.data.jpa.repositories.enabled=false
#是否注册OpenEntityManagerInViewInterceptor，将JPA EntityManager绑定到整个请求处理的线程，默认true
#spring.jpa.open-in-view=false
#要操作的目标数据库的名称，默认情况下自动检测。也可以使用“Database”枚举进行设置。
#spring.jpa.database-platform=com.ring.welkin.common.persistence.jpa.support.dialect.MySQL5DialectUTF8
#DDL模式。这实际上是"hibernate.hbm2ddl.auto"属性。当使用嵌入式数据库且未检测到模式管理器时，默认为“create-drop”。否则，默认为"none"。
#spring.jpa.hibernate.ddl-auto=update
#物理命名策略的完全限定名
#spring.jpa.hibernate.naming.physical-strategy=org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy
#是否输出hibernate sql
#spring.jpa.properties.hibernate.show_sql=true
#是否格式化hibernate sql
#spring.jpa.properties.hibernate.format_sql=true

#要操作的目标数据库的名称，默认情况下自动检测。也可以使用“Database”枚举进行设置。
hibernate.dialect=com.ring.welkin.common.persistence.jpa.support.dialect.MySQL5DialectUTF8
#存储引擎类型
hibernate.dialect.storage_engine=innodb
#DDL模式，这里仅支持update,避免drop导致的现场事故，默认填none无需维护表结构
hibernate.hbm2ddl.auto=none
#是否输出hibernate sql
hibernate.show_sql=true
#是否格式化hibernate sql
hibernate.format_sql=true

## mybatis config
#将下划线映射为驼峰大小写
mybatis.configuration.map-underscore-to-camel-case=true
#默认加载的批大小
mybatis.configuration.default-fetch-size=1000
#默认语句超时时间
mybatis.configuration.default-statement-timeout=60
#是否开启缓存
mybatis.configuration.cache-enabled=false
#是否开启懒加载
mybatis.configuration.lazyLoadingEnabled=false
#是否开启侵略性惰性加载
mybatis.configuration.aggressiveLazyLoading=true
#缓存类型
mybatis.configuration.variables.cacheType=ehcache


##mapper config
#mapper是否开启不为空判断
mapper.not-empty=false
#mapper使用的方言
mapper.identity=${spring.datasource.dialect}
#mapper字段命名策略
mapper.style=camelhumpAndLowercase
#mapper是否开启方法注解
mapper.enable-method-annotation=true


##pagehelper config
#分页数据库方言
pagehelper.helperDialect=${spring.datasource.dialect}
#是否开启合理化分页
pagehelper.reasonable=true
#是否支持方法参数
pagehelper.supportMethodsArguments=true
#自定义参数
pagehelper.params=count=countSql
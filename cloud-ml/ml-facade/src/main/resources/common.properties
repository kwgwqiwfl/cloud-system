##nacos discovery config
#是否开启nacos服务发现功能
spring.cloud.nacos.discovery.enabled=false
#是否开启nacos服务发现注册服务器地址
spring.cloud.nacos.discovery.server-addr=${spring.cloud.nacos.config.server-addr}
#是否开启nacos服务发现注册服务命名空间
spring.cloud.nacos.discovery.namespace=${spring.cloud.nacos.config.namespace}
#是否开启nacos服务发现注册服务分组
spring.cloud.nacos.discovery.group=${spring.cloud.nacos.config.group}
#nacos认证账号
spring.cloud.nacos.discovery.username=${spring.cloud.nacos.config.username}
#nacos认证密码
spring.cloud.nacos.discovery.password=${spring.cloud.nacos.config.password}



##jackson config
#jackson序列化日期格式
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
#jackson序列化日期时区
spring.jackson.time-zone=GMT+8
#jackson序列化是否缩进输出
spring.jackson.serialization.indent-output=false
#jackson序列化是否在bean为空时失败
spring.jackson.serialization.fail-on-empty-beans=false
#jackson序列化是否默认属性包含
spring.jackson.default-property-inclusion=always
#jackson序列化生成器是否忽略未知属性
spring.jackson.generator.ignore-unknown=true
#jackson反序列化是否遇到忽略属性时失败
spring.jackson.deserialization.fail-on-ignored-properties=false
#jackson反序列化是否遇到未知属性时失败
spring.jackson.deserialization.fail-on-unknown-properties=false
#jackson反序列化是否将空字符串转为null值
spring.jackson.deserialization.accept-empty-string-as-null-object=true
#jackson反序列化是否允许不加引号的控制字符
spring.jackson.parser.allow-unquoted-control-chars=true
#jackson反序列化是否允许允许单引号
spring.jackson.parser.allow-single-quotes=true
#jackson解析器是否忽略未定义
spring.jackson.parser.ignore-undefined=true
#jackson解析器是否自动关闭资源
spring.jackson.parser.auto-close-source=true

##jackson ext serialization config
#jackson序列化将long类型数据转为string
spring.jackson.ext.serialization.write-long-as-string=true
#jackson序列化将为null的数组转为空字符串
#spring.jackson.ext.serialization.write-null-array-as-empty-string=true
#jackson序列化将为null的double数据转为空字符串
#spring.jackson.ext.serialization.write-double-as-string=true
#jackson序列化将为null的字符串转为空字符串
#spring.jackson.ext.serialization.write-null-string-as-empty-string=true


##web resources config
#是否启用默认资源处理
spring.web.resources.add-mappings=true
#静态资源的位置。默认为类路径:[/META-INF/resources/， /resources/， /static/， /public/]
spring.web.resources.static-locations=classpath:/webapp/,classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/


#server compression config
#是否启用响应压缩
server.compression.enabled=true
#应压缩的MIME类型的逗号分隔列表，默认：text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
#server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
#执行压缩所需的最小“Content-Length”值，默认2KB
server.compression.min-response-size=2048


#multipart file config
#是否启用支持多段上传，默认true
spring.servlet.multipart.enabled=true
#最大文件大小，默认1MB
spring.servlet.multipart.max-file-size=500MB
#最大请求大小，默认10MB
spring.servlet.multipart.max-request-size=500MB


## datasource config
## mysql start
#数据源方言：mysql,oracle，db2，sqlserver等
spring.datasource.dialect=mysql
#数据源要使用的连接池实现的完全限定名。默认情况下，它是从类路径自动检测的
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
#数据源JDBC驱动程序的完全限定名。默认根据URL自动检测
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.driver-class-name=com.mysql.jdbc.Driver
#数据源JDBC数据库URL
spring.datasource.url=jdbc:mysql://localhost:3306/cloud?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2b8&allowMultiQueries=true
#spring.datasource.url=jdbc:mysql://211.149.169.92:3306/ip?useSSL=false&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&rewriteBatchedStatements=true
#数据源登录账号
#spring.datasource.username=ip
spring.datasource.username=cloud
#数据源登录密码
#spring.datasource.password=DhrC2nL2XEjN5xee
spring.datasource.password=cloud
## mysql end


